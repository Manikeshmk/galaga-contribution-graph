name: 'Galaga Contribution Graph Engine'
description: 'Generates a stylized retro space shooter simulation based on your commit calendar intensity.'
author: 'manikeshmk'
branding:
  icon: 'activity'
  color: 'purple'
inputs:
  github_token:
    description: 'The automated workflow installation secret token.'
    required: true
runs:
  using: 'composite' # Changed to composite to allow a pre-install step
  steps:
    - name: Install Dependencies
      run: npm install
      shell: bash
      working-directory: ${{ github.action_path }}
      
    - name: Run Engine
      run: node index.js
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
