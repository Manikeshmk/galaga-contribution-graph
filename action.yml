name: 'Galaga Contribution Graph Engine'
description: 'Generates an animated space shooter simulation from your commit activity'
author: 'manikeshmk'
branding:
  icon: 'activity'
  color: 'purple'
inputs:
  github_token:
    description: 'The installation secret token'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Install Runtime Dependencies
      run: npm install
      shell: bash
      working-directory: ${{ github.action_path }}
      
    - name: Run Engine via TSX Compiler
      run: npx tsx index.js
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
