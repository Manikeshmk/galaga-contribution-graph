name: 'Galaga Contribution Graph Engine'
description: 'Generates an animated space shooter simulation from your commit activity'
author: 'manikeshmk'
branding:
  icon: 'activity'
  color: 'purple'
inputs:
  github_token:
    description: 'The installation secret token'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Install Runtime Dependencies
      run: npm install
      shell: bash
      working-directory: ${{ github.action_path }}
# Bundles your engine code into a stable CommonJS executable
    - name: Bundle and Run Engine
      run: |
        npx esbuild index.js --bundle --platform=node --format=cjs --outfile=dist-action/run.cjs --allow-overwrite --out-extension:.js=.js
        node dist-action/run.cjs
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
