name: 'Galaga Contribution Graph Engine'
description: 'Generates an animated space shooter simulation from your commit activity'
author: 'manikeshmk'
branding:
  icon: 'activity'
  color: 'purple'
inputs:
  github_token:
    description: 'The installation secret token'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Install Runtime Dependencies
      run: npm install
      shell: bash
      working-directory: ${{ github.action_path }}

    # Uses esbuild (included with tsx) to safely bundle your code into a flat execution file
    - name: Bundle and Run Engine
      run: |
        npx esbuild index.js --bundle --platform=node --format=esm --outfile=dist-action/run.js --allow-overwrite
        node dist-action/run.js
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
